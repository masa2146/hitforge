<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HitForge — Market Scan Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Modern Dark Theme Palette (Tailwind Inspired) */
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-hover: #334155;
    --line: #334155;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    
    /* Accents & Status Colors */
    --accent: #38bdf8;
    --accent-glow: rgba(56, 189, 248, 0.15);
    --green: #10b981;
    --orange: #f59e0b;
    --blue: #3b82f6;
    --purple: #a855f7;
    --red: #ef4444;
    --gray: #64748b;
    
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --transition: all 0.2s ease-in-out;
  }

  * { box-sizing: border-box; }
  
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text-main);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  
  a { color: var(--accent); text-decoration: none; transition: var(--transition); }
  a:hover { text-decoration: underline; color: #7dd3fc; }

  .wrap { max-width: 1280px; margin: 0 auto; padding: 40px 24px 80px; }
  
  /* Header */
  header { margin-bottom: 32px; border-bottom: 1px solid var(--line); padding-bottom: 24px; }
  header h1 { margin: 0 0 8px; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
  header .sub { color: var(--text-muted); font-size: 14px; font-weight: 500; }

  /* Summary Widgets */
  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .stat { 
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-md); 
    padding: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  }
  .stat .n { font-size: 28px; font-weight: 700; color: var(--text-main); line-height: 1.2; margin-bottom: 4px; }
  .stat .l { color: var(--text-muted); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .sigdist { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .sigchip { 
    font-size: 11px; padding: 4px 10px; border-radius: 999px; font-weight: 600; 
    border: 1px solid currentColor; background: rgba(255,255,255,0.05);
  }

  /* Filters */
  .filters { 
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-md); 
    padding: 16px 24px; display: flex; flex-wrap: wrap; gap: 24px; margin-bottom: 24px; align-items: center; 
  }
  .fgroup { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .fgroup .lbl { color: var(--text-muted); font-size: 13px; font-weight: 600; width: 60px; }
  .fbtn { 
    background: transparent; border: 1px solid var(--line); color: var(--text-muted); 
    padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 500; cursor: pointer; 
    transition: var(--transition);
  }
  .fbtn:hover { border-color: var(--text-muted); color: var(--text-main); }
  .fbtn.active { background: var(--accent); border-color: var(--accent); color: #0f172a; font-weight: 600; }

  /* Grid & Cards */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 24px; }
  
  .card { 
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-lg); 
    display: flex; flex-direction: column; overflow: hidden;
    transition: var(--transition); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.3); border-color: #475569; }
  
  .card-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--line); }
  .card-header .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
  .card h3 { margin: 0; font-size: 18px; font-weight: 600; line-height: 1.3; color: var(--text-main); }
  .card .id { color: var(--text-muted); font-size: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; margin-top: 4px; }
  
  .badges { display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }
  .badge { font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  
  .card-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; flex: 1; }
  
  .evidence { font-size: 13px; color: var(--accent); background: var(--accent-glow); padding: 10px 14px; border-radius: var(--radius-sm); font-weight: 500; border-left: 3px solid var(--accent); }
  .mech { font-size: 14px; color: #cbd5e1; }
  
  .fp { display: flex; gap: 6px; flex-wrap: wrap; }
  .fp span { background: #0f172a; border: 1px solid var(--line); font-size: 11px; padding: 4px 8px; border-radius: var(--radius-sm); color: var(--text-muted); font-weight: 500; }
  
  /* Scores Section */
  .scores-wrapper { background: #0f172a; border-radius: var(--radius-md); padding: 16px; margin-top: auto; }
  .scores { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
  .score { display: grid; grid-template-columns: 130px 1fr 30px; align-items: center; gap: 12px; font-size: 12px; font-weight: 500; color: var(--text-muted); }
  .score .track { background: var(--line); height: 6px; border-radius: 999px; overflow: hidden; width: 100%; }
  .score .fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent), var(--blue)); transition: width 0.5s ease; }
  .score .val { text-align: right; font-weight: 600; color: var(--text-main); }
  
  .total { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px dashed var(--line); font-size: 13px; color: var(--text-muted); font-weight: 500; }
  .total b { color: var(--text-main); font-size: 16px; font-weight: 700; }
  
  .card-footer { padding: 16px 20px; border-top: 1px solid var(--line); background: rgba(30, 41, 59, 0.4); display: flex; flex-direction: column; gap: 12px; }
  .kv { font-size: 13px; color: var(--text-muted); display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 6px; }
  .kv:last-child { border-bottom: none; padding-bottom: 0; }
  .kv b { color: var(--text-main); font-weight: 500; }
  
  .risks { margin: 0; padding-left: 20px; font-size: 13px; color: #fca5a5; }
  .risks li { margin-bottom: 4px; }
  
  .sources { display: flex; flex-direction: column; gap: 6px; font-size: 12px; margin-top: 8px; }
  .sources .src-item { display: flex; gap: 8px; align-items: center; }
  .sources .src-item::before { content: "→"; color: var(--text-muted); }
  .sources .src-date { color: var(--text-muted); font-size: 11px; }
  
  .sim { font-size: 12px; color: var(--orange); background: rgba(245, 158, 11, 0.1); padding: 8px 12px; border-radius: var(--radius-sm); border: 1px solid rgba(245, 158, 11, 0.2); display: flex; align-items: center; gap: 6px; }
  .manual { font-size: 10px; color: var(--purple); border: 1px dashed var(--purple); padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 4px; }
  
  /* Eliminated Section */
  details.elim { margin-top: 40px; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-md); transition: var(--transition); }
  details.elim[open] { border-color: #475569; }
  details.elim summary { cursor: pointer; padding: 16px 24px; font-weight: 600; color: var(--text-main); display: flex; align-items: center; gap: 8px; user-select: none; }
  details.elim ul { margin: 0; padding: 0 24px 24px 44px; color: var(--text-muted); font-size: 14px; list-style-type: square; }
  details.elim li { margin-bottom: 8px; }
  
  .empty { color: var(--text-muted); padding: 60px 20px; text-align: center; font-size: 16px; background: var(--panel); border-radius: var(--radius-lg); border: 1px dashed var(--line); }

  @media (max-width: 768px) {
    .filters { flex-direction: column; align-items: flex-start; gap: 16px; }
    .fgroup .lbl { width: 100%; margin-bottom: 8px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🔨 HitForge <span style="color:var(--text-muted); font-weight:400;">| Market Scan</span></h1>
    <div class="sub" id="subtitle"></div>
  </header>

  <section class="summary" id="summary"></section>

  <div class="filters">
    <div class="fgroup" id="signalFilters"><span class="lbl">Signal</span></div>
    <div class="fgroup" id="statusFilters"><span class="lbl">Status</span></div>
  </div>

  <section class="grid" id="grid"></section>

  <details class="elim" id="elimBox">
    <summary>Eliminated &amp; Previously Rejected (<span id="elimCount">0</span>)</summary>
    <ul id="elimList"></ul>
  </details>
</div>

<!-- ============================================================= -->
<!-- DATA                                                          -->
<!-- ============================================================= -->

<script>
(function(){
  var data;
  try { data = JSON.parse(document.getElementById('hitforge-data').textContent); }
  catch(e){ document.getElementById('grid').innerHTML = '<div class="empty">Invalid data JSON: '+e.message+'</div>'; return; }

  var SIG_COLOR = { "NEW-HOT":"var(--orange)", "RISING":"var(--green)", "EVERGREEN":"var(--blue)", "REVISIT":"var(--purple)" };
  var STATUS_COLOR = { pending:"var(--gray)", approved:"var(--green)", rejected:"var(--red)", revisit:"var(--purple)" };
  var SCORE_LABELS = { video_clarity:"Video Clarity", production_ease:"Production Ease", competition_gap:"Competition Gap", meta_potential:"Meta Potential" };

  function badge(text, color, isSolid) {
    if(isSolid) return '<span class="badge" style="background:'+color+';color:#fff;">'+text+'</span>';
    return '<span class="badge" style="background:'+color+'22;color:'+color+';border:1px solid '+color+'55">'+text+'</span>';
  }
  
  function total(c){ var s=c.scores; return s.video_clarity+s.production_ease+s.competition_gap+s.meta_potential; }

  // Header & Summary
  document.getElementById('subtitle').innerHTML = 'Scan Date: <b>' + data.scan_date + '</b> &nbsp;·&nbsp; ' + data.summary.card_count + ' Cards &nbsp;·&nbsp; ' + data.summary.eliminated_count + ' Eliminated';

  var sig = data.summary.signals || {};
  var sigChips = Object.keys(sig).map(function(k){
    var c = SIG_COLOR[k] || '#888';
    return '<span class="sigchip" style="color:'+c+'; border-color:'+c+'55;">'+k+' &nbsp; <b style="color:#fff;">'+sig[k]+'</b></span>'; 
  }).join('');
  
  document.getElementById('summary').innerHTML =
    '<div class="stat"><div class="n">'+data.summary.card_count+'</div><div class="l">Total Cards</div></div>'+
    '<div class="stat"><div class="n">'+data.summary.eliminated_count+'</div><div class="l">Eliminated</div></div>'+
    '<div class="stat" style="grid-column: span 2;"><div class="l">Signal Distribution</div><div class="sigdist">'+sigChips+'</div></div>';

  // Filters
  var state = { signal:"ALL", status:"ALL" };
  function mkFilters(containerId, key, values){
    var c = document.getElementById(containerId);
    values.forEach(function(v){
      var b = document.createElement('button');
      b.className = 'fbtn' + (v==="ALL" ? ' active':'');
      b.textContent = v==="ALL" ? "All" : v;
      b.onclick = function(){
        state[key]=v;
        Array.prototype.forEach.call(c.querySelectorAll('.fbtn'),function(x){x.classList.remove('active');});
        b.classList.add('active'); render();
      };
      c.appendChild(b);
    });
  }
  mkFilters('signalFilters','signal',["ALL","NEW-HOT","RISING","EVERGREEN","REVISIT"]);
  mkFilters('statusFilters','status',["ALL","pending","approved","rejected","revisit"]);

  // Render Cards
  function cardHTML(c){
    var scoreRows = Object.keys(SCORE_LABELS).map(function(k){
      var v = c.scores[k]||0, pct=(v/5*100);
      return '<div class="score"><span>'+SCORE_LABELS[k]+'</span>'+
        '<span class="track"><span class="fill" style="width:'+pct+'%"></span></span>'+
        '<span class="val">'+v+'/5</span></div>';
    }).join('');
    
    var fps = (c.fingerprint||[]).map(function(f){return '<span>'+f+'</span>';}).join('');
    var risks = (c.risks||[]).map(function(r){return '<li>'+r+'</li>';}).join('');
    var srcs = (c.sources||[]).map(function(s){
      return '<div class="src-item"><a href="'+s.url+'" target="_blank" rel="noopener">'+s.label+'</a> <span class="src-date">'+s.date+'</span></div>';
    }).join('');
    
    var sim = c.similar_to ? '<div class="sim"><span>⚠️</span> <div>Similar to <b>'+c.similar_to+'</b></div></div>' : '';
    var manual = (c.source==="manual entry") ? '<div class="manual">Manual Entry</div>' : '';
    
    return '<article class="card" data-signal="'+c.signal+'" data-status="'+c.status+'">'+
      '<div class="card-header">'+
        '<div class="top">'+
          '<div><h3>'+c.title+'</h3><div class="id">'+c.id+' '+manual+'</div></div>'+
          '<div class="badges">'+badge(c.signal, SIG_COLOR[c.signal]||'#888', true)+badge(c.status, STATUS_COLOR[c.status]||'#888', false)+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="card-body">'+
        '<div class="evidence">📈 '+ (c.signal_evidence||'') +'</div>'+
        '<div class="mech">'+c.mechanic+'</div>'+
        '<div class="fp">'+fps+'</div>'+ sim +
        '<div class="scores-wrapper">'+
          '<div class="scores">'+scoreRows+'</div>'+
          '<div class="total"><span>Total Score</span> <b>'+total(c)+' / 20</b></div>'+
        '</div>'+
      '</div>'+
      '<div class="card-footer">'+
        '<div>'+
          '<div class="kv"><span>CPI Range</span> <b>'+(c.cpi_range||'—')+'</b></div>'+
          '<div class="kv"><span>Target Market</span> <b>'+(c.target_market||'—')+'</b></div>'+
          '<div class="kv"><span>References</span> <b>'+ (c.reference_games||[]).join(', ') +'</b></div>'+
        '</div>'+
        '<div>'+
          '<span style="font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase;">Risks</span>'+
          '<ul class="risks">'+risks+'</ul>'+
        '</div>'+
        '<div>'+
          '<span style="font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase;">Sources</span>'+
          '<div class="sources">'+srcs+'</div>'+
        '</div>'+
      '</div>'+
      '</article>';
  }

  function render(){
    var cards = (data.cards||[]).slice()
      .filter(function(c){ return state.signal==="ALL" || c.signal===state.signal; })
      .filter(function(c){ return state.status==="ALL" || c.status===state.status; })
      .sort(function(a,b){ return total(b)-total(a); });
    
    var g = document.getElementById('grid');
    g.innerHTML = cards.length ? cards.map(cardHTML).join('') : '<div class="empty">Seçilen filtrelere uygun kart bulunamadı.</div>';
  }
  render();

  // Eliminated List
  var elim = data.eliminated||[];
  document.getElementById('elimCount').textContent = elim.length;
  document.getElementById('elimList').innerHTML = elim.length
    ? elim.map(function(e){return '<li><b style="color:#f8fafc; font-family:ui-monospace,Menlo,monospace">'+e.id+'</b> <span style="color:#64748b; margin:0 8px;">—</span> '+e.reason+'</li>';}).join('')
    : '<li>None.</li>';
})();
</script>
</body>
</html>
